version: "3.9"

# ═══════════════════════════════════════
# DEV: docker-compose up
# PROD: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
# ═══════════════════════════════════════

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: regscan
      POSTGRES_USER: regscan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regscan"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "${WEB_PORT:-8001}:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://regscan:${POSTGRES_PASSWORD:-dev_password}@db/regscan"
      DATABASE_URL_SYNC: "postgresql+psycopg2://regscan:${POSTGRES_PASSWORD:-dev_password}@db/regscan"
      SCHEDULER_ENABLED: "false"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    depends_on:
      db:
        condition: service_healthy

  batch:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://regscan:${POSTGRES_PASSWORD:-dev_password}@db/regscan"
      DATABASE_URL_SYNC: "postgresql+psycopg2://regscan:${POSTGRES_PASSWORD:-dev_password}@db/regscan"
      SCHEDULER_ENABLED: "false"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - batch

volumes:
  pgdata:
