es": ["글로벌 승인 후 7년 경과, 국내 미허가"], "analysis": {"hot_issue_reasons": ["EMA 승인", "EMA PRIME", "희귀의약품", "주요 질환 치료제"]}, "therapeutic_areas": ["oncology"]}, "_source_urls": {"ema": "https://www.ema.europa.eu/en/medicines/human/EPAR/yescarta"}, "_nct_id": "NCT03391466", "_score": 50, "_hot_issue_reasons": ["EMA 승인", "EMA PRIME", "희귀의약품", "주요 질환 치료제"], "_therapeutic_areas": ["oncology"], "_known_inns": ["Polatuzumab Vedotin", "Zanidatamab-hrii", "Zolbetuximab", "Ivosidenib", "Talquetamab"]}, "b": {"inn": "Axicabtagene Ciloleucel", "headline": "Yescarta, DLBCL 2차 CAR-T 표준화에도 국내 공백 7년", "subtitle": "EMA 2018-08-23 승인 후 D+2742일…비급여·긴급도입만 남았다", "key_points": ["CD19를 표적하는 자가 CAR-T(항종양 T세포를 체외에서 재프로그래밍)로, DLBCL·HGBL의 조기 재발/불응(1차 치료 후 12개월 이내) 및 r/r DLBCL·PMBCL(2차 이상)에서 사용되는 항암제", "EMA가 2018-08-23 허가를 완료한 뒤 이미 D+2742일이 경과해, 유럽에서는 CAR-T가 림프종 치료 알고리즘의 핵심 축으로 자리 잡았다", "국내는 아직 허가 문턱을 넘지 못했고 HIRA 등재 정보도 확인되지 않아, 환자 접근은 사실상 ‘전액 비급여/긴급도입’ 경로에 묶여 있다", "임상 근거가 축적된 CAR-T임에도 글로벌 승인 후 장기 미진입 구간이어서, 판매권자·공급망(세포채집~제조~투여) 구축 여부가 국내 도입의 실질적 분기점이 된다"], "global_section": "Axicabtagene ciloleucel(Yescarta)은 ‘2차 치료에서 CAR‑T를 앞당길 수 있느냐’라는 질문에 임상적으로 답을 제시한 제품군의 대표 주자다. EMA가 2018-08-23 승인한 지 D+2742일이 흐르는 동안, 재발·불응성 공격형 B세포 림프종에서 세포치료가 더 이상 ‘마지막 카드’만은 아니라는 메시지가 강해졌다.\n\n기전은 CD19 발현 B세포 림프종을 표적하도록 환자 유래 T세포를 CAR로 재설계해 주입하는 방식으로, 항체·화학요법과 다른 차원의 깊은 반응(깊은 관해)을 노린다. 임상적으로는 2차 치료 영역에서 표준치료 대비 사건없는생존(EFS) 중앙값 8.3개월 대 2.0개월, HR 0.398(p<0.0001)로 격차를 만들었고, 반응률도 83% 대 50%로 벌어졌다.\n\n- **유효성(2차 치료 근거)**: EFS 8.3개월 vs 2.0개월(HR 0.398), ORR 83% vs 50%로 ‘브릿지 치료 후 이식’ 중심 전략을 재고하게 만든 수치\n- **안전성(중증 이상반응 맥락)**: 발열·폐렴·저혈압과 더불어 뇌병증·실어증 등 신경계 독성이 상위 중증 이상사례로 보고돼, 투여기관의 중환자 대응 역량이 성패를 가른다\n- **경쟁 지형(국내 관점 비교용)**: Polatuzumab vedotin·Zanidatamab-hrii·Zolbetuximab·Ivosidenib·Talquetamab 등도 ‘고난도·고가 혁신 치료’ 축에 놓이며, 도입 시 병원 내 약제/심사·치료 인프라 경쟁을 유발한다\n\n결국 Yescarta의 글로벌 포지셔닝은 ‘반응률을 높이는 약’이 아니라 ‘치료 경로(2차 치료 알고리즘)를 바꾸는 약’에 가깝다. 다만 제조·물류·투여센터 인증이 패키지로 따라붙는 CAR‑T의 특성상, 약물 자체의 임상 우위만으로 시장 진입이 자동으로 따라오지 않는다는 점이 다른 항암제와의 결정적 차이다.", "domestic_section": "국내에서는 EMA 승인 이후 장기간이 경과했음에도 여전히 미허가 상태로, 치료 선택지가 ‘의학적 필요’보다 ‘제도·인프라 가능’에 의해 좌우되는 전형적 공백 구간에 놓여 있다. 글로벌 승인 후 2742일이 지난 ‘장기 미허가’라는 라벨은, 단순 심사 지연이라기보다 판매권자 부재 또는 시장성 판단 보류 같은 구조적 병목 가능성을 시사한다.\n\n- **접근성 현실**: MFDS 미허가로 정규 처방·급여 경로가 막혀 있고, HIRA 등재 정보도 확인되지 않아 병원은 표준 프로세스를 설계하기 어렵다\n- **경쟁약 국내 변수(지정된 범위 내)**: Polatuzumab vedotin·Zanidatamab-hrii는 국내 진입이 ‘expected’로 분류돼, 향후 림프종/종양내과 고가약 포트폴리오 경쟁이 동시다발로 전개될 수 있다\n- **도입의 실무 허들**: CAR‑T는 약가 협상만으로 끝나지 않고, 채집-제조-수송-투여 일정 관리 및 중증 독성 대응 체계가 동시에 갖춰져야 ‘진짜 도입’이 된다\n\n시사점은 명확하다. 국내 도입이 이뤄지지 않은 상태가 길수록, 환자·병원은 긴급도입 또는 해외 치료로 비용과 시간을 떠안는 구조가 고착된다. 반대로 도입이 성사되는 순간에는 투여기관 선정, 적응증(2차/3차 이상)별 환자 선별, 병상·ICU 연계 같은 운영 이슈가 급여 기준만큼이나 중요한 ‘실제 진입장벽’이 된다.", "medclaim_section": "현 시점에서 국내 정규 청구(건강보험 급여)는 전제 자체가 성립하기 어렵다. 현재는 전액 비급여 구간에 놓여 있어, 환자 부담을 전제로 한 예외적 접근 경로만 논의될 수 있다.\n\n- **KODC 긴급도입**: 개별 신청 경로이며 비용은 전액 환자 부담으로 귀결되는 구조다\n- **임상시험/프로그램**: 공개된 국내 임상 등록 정보가 없는 상태인 만큼, 실제 접근 가능성은 기관별·스폰서별 프로그램 유무 확인이 선행돼야 한다\n- **실손보험**: 비급여 비용을 일부 보전할 여지가 있으나, 약제·입원·중환자치료 등 구성 항목별 보장 여부가 달라 사전 확인이 필수다\n\n향후 급여 등재가 성사되면 암환자 산정특례(5%) 적용 가능성이 열리지만, 그때도 ‘고가 약제+중증 부작용 관리’ 특성상 사전심사(PA) 및 기관 요건이 함께 강화될 공산이 크다. 약제팀과 심사 담당자는 지금 단계에서부터 CAR‑T 표준 운영 프로토콜(의뢰-채집-투여-독성대응)과 비용 항목 분해(약제 외 입원·시술·검사)를 미리 설계해, 긴급도입 상담과 향후 급여 전환 시 혼선을 최소화하는 것이 실익이 크다.", "generated_at": "2026-02-24T18:09:53.944357", "source_data": {"inn": "axicabtagene ciloleucel", "domestic_status": "uncertain", "fda_approved": false, "fda_date": null, "ema_approved": true, "ema_date": "2018-08-23", "mfds_approved": false, "mfds_date": null, "mfds_brand_name": "", "hira_status": "not_found", "hira_code": "", "hira_criteria": "", "hira_price": null, "cris_trial_count": 0, "has_active_trial": false, "global_score": 50, "korea_relevance_score": 10, "quadrant": "normal", "summary": "글로벌: EMA | MFDS: 미허가", "analysis_notes": ["글로벌 승인 후 7년 경과, 국내 미허가"], "analysis": {"hot_issue_reasons": ["EMA 승인", "EMA PRIME", "희귀의약품", "주요 질환 치료제"]}, "therapeutic_areas": ["oncology"]}, "_source_urls": {"ema": "https://www. 26-02-12에 승인까지 더하면서 제형 혁신의 임상적 의미가 재부각됐다.\n\n다라투무맙은 CD38 발현이 높은 골수종 세포를 표적해 면역매개 세포독성과 보체의존성 세포독성 등을 유도하는 핵심 항체치료 축이다. 여기에 히알루로니다제를 결합한 제형은 투여 시간을 단축해 치료실 운영(체어타임)과 환자 부담을 동시에 건드리며, 병용요법 중심으로 길어지는 치료 여정에서 ‘지속 가능성’을 높이는 쪽으로 가치가 형성된다.\n\n- **Polatuzumab Vedotin**: 온콜로지 영역이지만 림프종 중심의 ADC로, 질환·진료과 동선이 달라 직접 대체재라기보다 고가 항암제 운영 경험을 공유하는 비교축\n- **Zanidatamab-hrii / Zolbetuximab**: 고형암 표적항체 계열로, 동일하게 병용·바이오마커 기반 급여 설계가 관건이라는 점에서 시장 진입 전략의 참고선\n- **Ivosidenib**: 분자표적 경구제 모델로, 장기투여·고가약 관리 관점의 비교축\n- **Talquetamab**: 혈액암(골수종) 계열이라는 점에서 ‘후기 라인 고가 혁신약’과 급여 충돌 가능성을 보여주는 비교축\n\n결국 이 약의 글로벌 포지셔닝은 “골수종 치료의 유효성 축 위에, 투여 편의성으로 시스템 비용을 재배치하는 제품”에 가깝다. 경쟁의 초점도 신약 간 우열보다, 병용 레짐 확장과 의료기관 운영 효율 개선이 실제 도입 속도를 좌우할 가능성이 크다.", "domestic_section": "국내에서는 글로벌 승인 후 3567일이 지난 ‘장기 미허가’ 상태로, 임상 근거의 문제가 아니라 **도입 주체(판매권자)와 급여·시장성 판단**이 핵심 병목으로 읽힌다. 허가가 없으니 등재·약가가 형성되지 못했고, 결과적으로 환자는 제도권 치료 접근이 막혀 있다.\n\n- **Polatuzumab Vedotin**: 국내 진입이 ‘expected’로 분류돼, 고가 항암제 도입/등재 프로세스가 먼저 굴러갈 가능성\n- **Zanidatamab-hrii**: 국내 ‘expected’로, 바이오마커 기반 표적항체 급여 설계 경험을 누적할 수 있는 비교 사례\n- **Zolbetuximab / Ivosidenib / Talquetamab**: ‘uncertain’로, 판매권·급여전략에 따라 진입 시계가 크게 흔들리는 군\n\n다발골수종은 병용요법이 치료의 중심이라, 국내에 들어올 경우에도 “어떤 병용·어떤 라인”으로 급여 문을 여느냐가 접근성을 좌우한다. 특히 장기 미허가 이력은 단순 신청 지연을 넘어, 국내 수요 대비 가격·등재 전략이 끝까지 정리되지 않았을 가능성을 시사한다.", "medclaim_section": "현 시점에서는 국내 미허가로 건강보험 청구 경로가 성립하지 않으며, 사실상 전액 환자부담의 비급여 구간에 놓여 있다. 다만 향후 급여 등재가 성사되면, 팩트 데이터 기준으로 **암환자 산정특례(본인부담 5%) 적용 가능성**이 열려 비용 구조가 급격히 바뀐다.\n\n- **KODC 긴급도입**: 개별 신청 경로이며 전액 부담 구조(환자·가족의 현금흐름 리스크가 큼)\n- **임상시험 참여**: 현재 확인된 국내 임상 정보가 없어, 기관별로 글로벌/다기관 프로토콜 오픈 여부를 선제 확인할 필요\n- **실손보험**: 비급여 구간에서는 청구 가능성이 거론되지만, 약관·사전심사·본인부담 한도에 따라 체감 부담이 크게 달라진다\n\n약제팀/심사부서는 ‘허가 전’ 단계에서부터 골수종 병용요법(레날리도마이드·덱사메타손, 보르테조밉 기반) 처방 경로와 예외적 도입 요청(KODC) 접수 프로세스를 표준화해두는 것이 실제 분쟁 비용을 줄인다. 급여 전환 시에는 산정특례(5%) 적용 요건과 병용·라인 기준이 청구 성패를 가르는 핵심 체크포인트가 된다.", "generated_at": "2026-02-24T18:09:49.503908", "source_data": {"inn": "DARATUMUMAB AND HYALURONIDASE-FIHJ (HUMAN RECOMBINANT)", "domestic_status": "uncertain", "fda_ 국내 미허가·비급여 공백 지속", "key_points": ["CD20×CD3 이중특이항체로 T세포를 종양 B세포에 재유도해 세포독성을 끌어올리는 기전이며, 2회 이상 전신치료 후 재발·불응성 여포성 림프종(FL) 성인 환자 단독요법에 사용", "EMA는 2022-06-03에, FDA는 2025-12-19에 승인 완료로 글로벌 규제기관의 유효성·안전성 판단을 통과했다는 상징성이 크다", "국내는 아직 식약처 허가 문턱을 넘지 못했고, 급여는 미등재(비급여)로 가격·기준 자체가 비어 있어 환자 접근성은 사실상 ‘제로’에 가깝다", "글로벌 승인 후 1362일이 지난 ‘장기 미허가’ 국면인 만큼, 판매권자/도입 의지의 확인이 1차 관문이며 이후 급여 협상에서는 항암 산정특례(5%) 적용 가능성이 실질적 수용성을 좌우한다"], "global_section": "모수네투주맙은 재발·불응성 FL에서 ‘T세포를 다시 끌어오는’ 이중특이항체 전략을 상용화 단계로 끌어올린 약물이라는 점에서 지금 중요한 의미가 있다. EMA가 2022-06-03에 승인한 지 1362일이 흘렀고, FDA도 2025-12-19에 승인 결정을 내리며 글로벌 표준치료 옵션으로의 지위를 굳혔다.\n\n기전은 CD20(종양 B세포)과 CD3(T세포)를 동시에 붙잡아 면역 시냅스를 형성시키는 방식으로, 항체 단독으로도 세포독성 T세포 반응을 유도하는 것이 핵심이다. 적응증이 ‘2회 이상 전신치료 후’인 만큼 CAR-T, 항체치료, PI3K 억제제 등 여러 라인을 거친 환자군에서 치료 연속성을 확보하려는 임상적 필요와 맞닿아 있다.\n\n- **Polatuzumab Vedotin**: ADC 계열로 ‘약물 탑재’ 전략에 강점이 있는 반면, 모수네투주맙은 ‘T세포 리크루팅’이라는 면역학적 축이 다르다\n- **Talquetamab**: 다발골수종 계열 이중항체 흐름을 대표하는 약물로, 이중특이항체의 안전관리(사이토카인 방출 등) 역량이 시장 진입의 전제라는 점을 상기시킨다\n\n결국 모수네투주맙의 글로벌 포지셔닝은 ‘후기 라인 FL에서 고정 기간 투여/외래 기반 관리 가능성’ 같은 운영상의 장점이 성패를 가르며, 각국에서 안전관리 프로토콜과 투여 인프라가 확산될수록 채택 장벽은 낮아진다.", "domestic_section": "국내에서는 글로벌에서 이미 규제기관 판단이 끝난 약물이 1362일 경과에도 미허가로 남아 있어, 임상 수요보다 ‘도입 주체 부재 또는 시장성 판단 보류’가 병목으로 읽힌다. 특히 희귀의약품 맥락이 있는 항암제임에도 허가 트랙이 열리지 않았다는 점은, 의료현장에서의 접근 경로가 제도적으로 막혀 있다는 뜻이다.\n\n- **Polatuzumab Vedotin(도입 기대)**: 혈액암 치료 영역에서의 경쟁 심화 요인으로, 동일 기관의 예산·평가 프레임을 선점할 가능성이 있다\n- **Ivosidenib(도입 불확실)**: 바이오마커 기반 표적항암제의 급여·선별검사 패키지 논의가 커질수록, 고가 항암제의 등재 문턱이 함께 높아질 수 있다\n- **Talquetamab(도입 불확실)**: 이중항체 계열의 안전관리·입원/외래 운영 모델이 국내에서 정착되면 모수네투주맙에도 우호적 환경이 조성된다\n\n실무적으로는 ‘국내 허가 공백’ 자체가 가장 큰 리스크이므로, 병원은 도입 가능성이 가시화되는 즉시 투여 프로토콜(용량 증량, 이상반응 대응)과 다학제 운영체계를 먼저 설계해 두는 쪽이 합리적이다. 또한 향후 급여 논의가 시작되면, 후기 라인 FL이라는 적응증 특성상 환자 수는 제한적이더라도 1인당 약제비 충격이 커질 수 있어 예산영향 평가가 핵심 쟁점이 된다.", "medclaim_section": "현 시점에서 국내는 미허가·비급여 구간이어서 건강보험 청구는 성립하지 않으며, 환자 접근은 제도적 예외 경로에 의존한다. 다만 팩트 기준으로 ‘향후 등재 시 암환자 산정특례 5% 적용 가능’이 명시돼 있어, 등재만 성사되면 환자 부담 구조는 급격히 개선될 여지가 있다.\n\n- KODC 긴급도입: 개별 신청 구조이며 전액 환자부담이 전제라, 의료기관은 예 : "uncertain", "fda_approved": true, "fda_date": "2025-10-14", "ema_approved": true, "ema_date": "2025-11-24", "mfds_approved": false, "mfds_date": null, "mfds_brand_name": "", "hira_status": "reimbursed", "hira_code": "708601BIJ", "hira_criteria": "급여", "hira_price": 73528.0, "cris_trial_count": 0, "has_active_trial": false, "global_score": 40, "korea_relevance_score": 20, "quadrant": "normal", "summary": "글로벌: FDA+EMA | MFDS: 미허가 | HIRA: 급여 (₩73,528)", "analysis_notes": []}, "_source_urls": {"fda": "https://www.accessdata.fda.gov/scripts/cder/daf/index.cfm?event=overview.process&ApplNo=209637", "ema": "https://www.ema.europa.eu/en/medicines/human/EPAR/kyinsu"}, "_nct_id": "", "_score": 40, "_hot_issue_reasons": ["FDA 승인", "EMA 승인", "FDA+EMA 근접 승인", "주요 질환 치료제"], "_therapeutic_areas": ["metabolic"], "_known_inns": ["Setmelanotide", "Parathyroid Hormone", "Semaglutide", "Palopegteriparatide", "Metreleptin"], "_copay_exemption": null}, "b": {"inn": "Semaglutide", "headline": "세마글루타이드 비만치료, 승인 빠른데 국내는 ‘급여-허가’ 역전", "subtitle": "GLP-1 작용제 체중관리 적응증 | 식약처 미확인인데 심평원 급여가 먼저 잡혔다", "key_points": ["GLP-1 수용체 작용제로 식욕·위배출을 조절해 체중감량과 유지에 쓰이며, 성인 비만(BMI≥30) 또는 동반질환 있는 과체중(BMI≥27)에서 식이·운동 병행요법으로 허가되는 계열(항비만제)", "FDA는 2025-10-14 승인했고 EMA도 2025-11-24 승인했다(두 기관 승인 간격이 짧아 글로벌 표준화가 빠르게 진행된 케이스)", "국내는 식약처(MFDS) 허가 여부가 확인되지 않지만, 심평원(HIRA) 급여 등재 상태로 약가 73,528원이 입력돼 ‘허가-급여’ 통상 순서와 맞지 않는 데이터 구조가 관측된다", "글로벌 승인 후 132일 경과로 입력된 ‘통상 허가 신청 준비 단계(1~3년)’ 구간에 해당하며, 경쟁군으로 제시된 setmelanotide·metreleptin 등도 국내 상태가 불확실로 묶여 있어 국내 시장은 ‘도입 주체/허가 트랙’이 실질 변수가 된다"], "global_section": "세마글루타이드(semaglutide)는 GLP-1 수용체를 활성화해 포만감을 높이고 섭취를 줄이는 기전으로, 비만을 ‘생활요법 보조’가 아니라 약물치료 대상으로 끌어올린 축에 속한다. 입력된 적응증도 성인에서 BMI≥30 또는 동반질환을 가진 BMI≥27의 체중관리(감량 및 유지)로, 전형적인 비만 치료 라벨이다. 이번 데이터의 핵심은 FDA(2025-10-14)와 EMA(2025-11-24)가 짧은 간격으로 승인해, 동일 계열 약물의 글로벌 채택 속도를 다시 끌어올렸다는 점이다.\n\n| 기관 | 상태 | 일자 |\n|---|---|---|\n| FDA | 승인 완료 (D+132일) | 2025-10-14 |\n| EMA | 승인 완료 (D+91일) | 2025-11-24 |\n| MFDS | 승인 여부가 확인되지 않는다 | - |\n\n임상 데이터로는(입력 제 , 특히 aa나 b 세포 암종에서 활용도와 차별성이 부각된다. 이에 따라 경쟁약으로 Polatuzumab Vedotin와 같은 CD79b 및 CD20 타겟 약물과의 비교에서도 우위를 점할 수 있는 가능성이 있다.", "domestic_section": "현재 Tagraxofusp는 한국의 MFDS에서 아직 허가를 받지 못해 실제로 환자에게 사용될 수 없는 상황이다. 연속된 글로벌 승인에도 불구하고, 국내 시장에 진입하기 위한 공식 절차가 سا실적 정체를 보이고 있다.\n\n- **국내 상황**  \n  - Tagraxofusp: MFDS 미허가, HIRA 비급여  \n- **경쟁약**  \n  - Polatuzumab Vedotin: 허가 기대 중  \n  - Zanidatamab-hrii: 허가 기대 중  \n  - Zolbetuximab: 국내 상황 미확인  \n\n이와 같은 경쟁 약물은 각각의 허가 상태에 따라 치료 접근성을 결정짓는 주요 요소로 작용한다. Tagraxofusp의 국내 허가가 지연되고 있는 만큼, 추가적인 시장 변화가 필요하다.", "medclaim_section": "현재 Tagraxofusp는 한국에서 미허가인 상태로 건강보험 급여가 불가능하다.  \n\n| 시나리오 | 본인부담률 | 예상 부담액 |\n|---|---|---|\n| 일반 급여 | 30% | N/A |\n| 희귀질환 산정특례 | 10% | N/A |\n| 비급여 사용 시 | 100% | N/A |\n\n환자들은 비급여로 사용하기 위해 전액 부담해야 하며, 헐당한 비용이 발생할 수 있다. 급여가 시작될 경우, 희귀질환 산정특례에 따라 본인 부담이 줄어들 수 있으나, 현재로서는 명확한 급여 상황이 없기 때문에 환자들은 실질적 대안이 없는 상태다. 약제팀에서는 주기적으로 Tagraxofusp의 허가 및 급여 관련 진행 상황을 모니터링할 필요가 있다.", "generated_at": "2026-02-23T11:14:29.952963", "global_heading": "전세계 BPDCN 치료제의 미래를 열어가고 있다", "domestic_heading": "6년째 공백, Tagraxofusp의 한국 도입은 지연 중", "source_data": {"inn": "TAGRAXOFUSP", "domestic_status": "uncertain", "fda_approved": true, "fda_date": "2023-07-26", "ema_approved": true, "ema_date": "2021-01-07", "mfds_approved": false, "mfds_date": null, "mfds_brand_name": "", "hira_status": "not_found", "hira_code": "", "hira_criteria": "", "hira_price": null, "cris_trial_count": 0, "has_active_trial": false, "global_score": 45, "korea_relevance_score": 10, "quadrant": "normal", "summary": "글로벌: FDA+EMA | MFDS: 미허가", "analysis_notes": ["글로벌 승인 후 5년 경과, 국내 미허가"], "analysis": {"hot_issue_reasons": ["FDA 승인", "EMA 승인", "희귀의약품", "주요 질환 치료제"]}, "therapeutic_areas": ["oncology"]}, "_source_urls": {"fda": "https://www.accessdata.fda.gov/scripts/cder/daf/index.cfm?event=overview.process&ApplNo=761116", "ema": "https://www.ema.europa.eu/en/medicines/human/EPAR/elzonris"}, "_nct_id": "", "_score": 45, "_hot_issue_reasons": ["FDA 승인", "EMA 승인", "희귀의약품", "주요 질환 서 전신치료 이후 선택지가 제한되는 ‘후기라인 공백’을 ADC로 파고든 약이다. 조직인자(TF)를 발현하는 종양세포에 결합해 세포독성 약물을 세포 내로 전달하는 방식으로, 기존 단독 화학요법(의사 선택요법)과 결이 다르다.\n\n| 지표 (NCT04697628) | 티소투맙 베도틴 | 화학요법 | 통계 |\n|---|---:|---:|---|\n| 전체생존(OS) 중앙값 | 11.5개월 | 9.5개월 | HR 0.70 (95% CI 0.54–0.89), p=0.0038 |\n| 무진행생존(PFS) 중앙값 | 4.2개월 | 2.9개월 | HR 0.67 (95% CI 0.54–0.82), p<0.0001 |\n| 객관적반응률(ORR) | 17.8% | 5.2% | OR 4.0 (95% CI 2.1–7.6), p<0.0001 |\n\n임상적으로는 OS 2.0개월 차이(11.5 vs 9.5개월)를 ‘통계적으로 유의한 위험 감소(HR 0.70)’로 입증했다는 점이 급여 평가에서 핵심 근거가 된다. 안전성은 중증 이상반응(SAE) 발생이 250명 중 82명(티소투맙) vs 239명 중 94명(화학요법)으로 제시됐고, SAE 상위 항목에 패혈증(5명), 장폐색(6명) 등이 포함돼 입원·처치 자원이 동반되는 항암제라는 점을 전제로 운영해야 한다. EMA는 2025-03-28, FDA는 2025-11-12 승인을 완료해 같은 적응증·후기라인에서 ‘근거-규제’의 문턱을 이미 넘겼다.", "domestic_section": "국내에서 티소투맙 베도틴은 식약처(MFDS) 허가가 확인되지 않고, 심평원(HIRA) 급여 등재/약가도 조회되지 않아 실제 처방-청구로 이어질 경로가 막혀 있다. 입력 데이터 기준 글로벌 승인 후 332일 경과로 ‘허가 신청 준비 단계(통상 1~3년)’에 해당하며, 판매권자 확정과 허가 자료 제출이 선행돼야 타임라인이 움직인다.\n\n| 기관 | 상태 | 일자 |\n|---|---|---|\n| EMA | 승인 완료 | 2025-03-28 |\n| FDA | 승인 완료 | 2025-11-12 |\n| 식약처(MFDS) | 승인 여부가 확인되지 않는다 | - |\n| 심평원(HIRA) | not_found(급여/약가 공백) | - |\n\n경쟁 지형은 ‘항암제 전반’에선 ADC·바이오 신약 도입이 가속 중이지만, 입력된 경쟁약(Polatuzumab vedotin, Zanidatamab-hrii, Zolbetuximab, Ivosidenib, Talquetamab) 모두 치료영역만 ‘oncology’로 묶여 있을 뿐 자궁경부암 직접 경쟁 약물로 보기 어렵다. 즉, 국내 도입의 변수는 경쟁약보다도 ‘국내 허가 신청 착수’와 ‘급여 평가에서 OS 개선 근거를 어떻게 반영하느냐’에 더 가깝다. 병원 약제팀 관점에서는, 허가 이전에는 원내 약제 리스트·DUR·표준치료 경로에 편입할 실무 작업 자체가 불가능해 ‘도입 준비’가 아니라 ‘도입 신호 감지(허가 신청/품목허가)’ 단계로 분류해야 한다.", "medclaim_section": "현재 국내에서 티소투맙 베도틴은 심평원 등재 정보가 없어 건강보험 청구가 불가한 상태로 해석된다(급여/약가 not_found). 따라서 비용 시뮬레이션은 ‘약가가 확정된 이후’에만 가능하며, 현 시점에서 병원이 확정 금액으로 환자 안내를 하는 것은 리스크가 크다.\n\n| 시나리오 | 본인부담률 | 환자 부담 산정 |\n|---|---:|---|\n| 향후 급여 등재(외래) | 30% | ‘심평원 상한금액 × 30%’로 산정(현재 약가 데이터 없음) |\n| 향후 급여 등재 + 암환자 산정특례 | 5% | ‘심평원 상한금액 × 5%’로 산정(현재 약가 데이터 없음) |\n| 비급여(등재 전/급여기준 외) | 100% | 전액 본인부담(약가·투여주기 미제공으로 금액 산출 불가) |\n\n허가·등재 전 접근 경로로는 (1) 국내 허가 임상 참여(CRIS 등록 0건으로 현재는 선택지 부재), (2) 제약사 프로그램(EAP/NPP) 여부 확인, (3) 제도권 밖 비용 부담 시 실손보험 청구 가능성 검 (바이오마커 기반 환자선별)을 먼저 정비해, 허가 직후 곧바로 처방 프로토콜로 전환 가능한 상태를 만들어야 한다.", "medclaim_section": "현재는 심평원 급여가 확인되지 않아 건강보험 청구는 불가하고, 식약처 허가도 확인되지 않아 통상 처방 경로 자체가 제한된다. 다만 입력 데이터에 암환자 산정특례(본인부담 5%)가 제시돼 있어, 향후 급여 등재에 성공할 경우 환자 부담 구조는 ‘급여 여부’에 따라 극단적으로 갈린다.\n\n| 시나리오 | 본인부담률 | 청구/접근 현실 |\n|---|---:|---|\n| 향후 급여 등재 + 암환자 산정특례 적용 | 5% | 급여기준(치료라인·HER2 IHC3+) 충족 시 청구 가능 |\n| 급여 전(현 시점) | 100% | HIRA 등재 부재로 보험청구 불가 |\n| 임상시험 참여 | 해당 없음 | CRIS 0건으로 국내 참여 경로가 현재는 제한적 |\n\n현 시점의 실무 대안은 ‘비급여 청구’가 아니라 ‘접근 경로 자체’가 없다는 점을 전제로 짜야 한다: 판매권자/도입사 확인, 긴급도입(개별 환자 단위) 가능성 검토, 해외 치료 연계 여부가 우선순위다. 또한 고가 항암 주사제 계열의 일반적 특성상(입력 약가 데이터는 없음) 향후 등재 시 1회 투여 100만원 초과 가능성을 염두에 두고, 사전심사(PA) 체계에 맞춘 서류 템플릿(바이오마커 결과지, 치료라인 입증자료)을 미리 준비하는 것이 약제팀의 비용·업무 리스크를 줄인다."}, "gpt-5.2-pro": {"ok": true, "elapsed": 115.6, "headline": "HER2 이중항체 자니다타맙, 담도암 2차 FDA·EMA 승인", "subtitle": "IHC3+ 바이오마커 치료제 | 국내 미허가·급여 ‘조회 불가’로 접근권 공백", "key_points": ["Zanidatamab-hrii(Ziihera)은 HER2의 두 에피토프에 동시에 결합하는 이중특이항체로, 절제 불가능/전이성 HER2 양성(IHC3+) 담도암(BTC)에서 1차 이상 전신치료 후 단독요법 적응증을 가진 항암제(antineoplastic agents)", "FDA가 2024-11-20 승인했고, EMA도 2025-06-27 승인(데이터상 ‘EMA Conditional Approval’ 포함)으로 미충족 수요가 큰 담도암 2차 이후에서 HER2 정밀치료의 규제 레벨 근거를 확보", "국내는 식약처(MFDS) 허가 여부가 ‘확인되지 않는다’(승인일/제품명 공란)이며, 심평원(HIRA)도 등재/약가가 ‘not_found’로 조회되지 않아 청구·약가 협상 논의의 출발점 자체가 부재", "FDA 승인 후 D+460일 경과 시점이며, 입력된 가이드(‘글로벌 승인 후 460일 — 허가 신청 진행 중일 가능성(통상 1~2년)’)에 비춰 병원은 HER2 검사·환자선별(특히 IHC3+) 프로세스를 먼저 갖춰야 ‘허가 직후’ 도입 속도를 올릴 수 있다"], "global_heading": "담도암 2차에 HER2가 들어왔다", "global_section": "담도암(BTC)은 1차 치료 이후 선택지가 급격히 줄어드는 대표적 고난도 암종인데, zanidatamab-hrii가 HER2 양성(IHC3+) 환자군을 바이오마커로 ‘잘라’ 단독요법 적응증을 확보했다는 점이 핵심이다. 이 약은 HER2의 서로 다른 부위에 동시 결합하는 이중특이항체로, 수용체 클러스터링·내재화 및 면역매개 작용(ADCC 등)을 통해 항종양 효과를 노린다. 임상 현장 관점에서 비교 축은 “표준 화학요법 이후(2차+)에 무엇을 줄 것인가”이며, 기존에는 FOLFOX 같은 세포독성 항암이나 HER2 표적(예: trastuzumab 기반 요법, trastuzumab deruxtecan 등)과의 포지셔닝이 문제였다.\n\n| 기관 | 상태(타임라인 시제 준수) | 승인일 |\n|---|---|---|\n| FDA | 승인했다 | 2024-11-20 |\n| EMA | 승인했다 | 2025-06-27 |\n\nFDA와 EMA가 7개월 간격으로 연속 승인한 것은 ‘HER2 양성 담도암’이라는 좁은 표적군에서 글로벌 규제기관이 치료 가치를 인정했다는 의미다. 특히 EMA는 입력 데이터에 ‘Conditional Approval’로 표기돼, 추적 데이터(유효성/안전성 보완) 제출이 시장 접근의 전제조건이 될 가능성이 크다.", "domestic_heading": "D+460일, 한국은 ‘조회 불가’", "domestic_section": "국내에서는 식약처(MFDS) 허가가 아직 확인되지 않고, 심평원(HIRA)도 급여 등재/약가 정보가 ‘not_found’로 조회되지 않아 처방·청구 경로가 열려 있지 않다. 또한 CRIS(임상연구정보서비스) 등록 임상이 0건으로, ‘국내 임상 기반의 조기 접근’ 루트도 현재 데이터상 확인되지 않는다. 다만 입력된 타임라인 코멘트가 “글로벌 승인 후 460일 — 허가 신청 진행 중일 가능성(통상 1~2년)”로 제시된 만큼, 병원 약제팀은 허가 직후 도입을 가정한 검사-처방-청구 체계를 선제 정렬할 필요가 있다.\n\n- MFDS: 승인 여부가 확인되지 않는다(제품명 공란)\n- HIRA: 급여/약가 ‘not_found’(등재 자체가 확인되지 않음)\n- CRIS: 국내 임상 0건(등록 기준)\n\n| 비교 항목(입력 경쟁 리스트) | INN | 국내 상태(데이터 표기) |\n|---|---|---|\n| 경쟁 후보 1 | Polatuzumab Vedotin | expected |\n| 경쟁 후보 2 | Zolbetuximab | uncertain |\n| 경쟁 후보 3 | Ivosidenib | uncertain |\n\n같은 항암 영역에서조차 국내 상태가 ‘expected/uncertain’로 남아 있는 약물들이 다수라는 점은, 국내 도입이 “글로벌 승인”만으로 자동 전환되지 않는다는 현실을 보여준다. 담도암은 바이오마커 기반(IHC3+) 처방이므로, 약제위원회 차원에서는 HER2 IHC 판독 표준화와 의무기록 내 치료 라인(‘이전 전신치료 1차 이상’) 확인 로직을 먼저 준비하는 것이 도입 속도를 좌우한다.", "medclaim_section": "현 시점에서 zanidatamab-hrii는 국내 허가·급여가 확인되지 않으므로, 건강보험 청구는 불가능한 상태로 정리하는 것이 안전하다. 즉, 처방을 전제로 한 급여 청구 설계(EDI 코드, 급여 기준 매핑, 사전심사(PA) 여부 판단)는 ‘약가·등재’가 확인되기 전까지는 진행할 수 없다. 다만 항암제 영역에서는 허가 전 접근 경로(긴급도입, 제약사 프로그램 등)가 변수로 작동할 수 있어, 환자 상담 시 비용 부담 구조를 명확히 구분해야 한다.\n\n| 시나리오 | 환자 본인부담률/부담 | 청구 가능 여부 | 비고 |\n|---|---|---|---|\n| 현재(미허가/미등재) | 100%(전액) | 불가 | HIRA 등재 ‘not_found’ |\n| 향후 급여 등재(암환자 산정특례) | 5% | 가능 | 입력 산정특례: 암환자 산정특례 5% (약가 미확인으로 금액 산정 불가) |\n| 향후 급여 등재(일반 급여) | 30% | 가능 | 외래 기준(약가 미확인) |\n\n- 허가 전 환자 접근이 필요할 때: KODC 긴급도입 등 ‘전액 본인부담’ 경로를 우선 안내하고, 병원 IRB/약사위원회 내부 절차(도입 적정성, 투여·모니터링 프로토콜)를 함께 준비해야 한다.\n- 약제팀/심사 실무 포인트: 담도암 ‘HER2 IHC3+’와 ‘이전 전신치료 1차 이상’ 요건이 청구 적정성의 핵심 문구가 될 가능성이 높아, 병리 결과지 템플릿과 항암 레지멘 라인관리(1L/2L)가 먼저 정비돼야 이후 삭감 리스크를 줄일 수 있다."}}, "b": {"gpt-5.2": {"ok": true, "elapsed": 29.9, "headline": "HER2 담도암 2차 표적, zanidatamab—미허가 공백", "subtitle": "FDA 2024-11-20·EMA 2025-06-27 승인…국내는 급여·임상 모두 ‘0’", "key_points": ["HER2에 2개 에피토프로 결합하는 이중특이 항체(항암제)로, 절제 불가능/전이성 HER2 양성(IHC3+) 담도암(BTC)에서 1차 이상 치료 후 단독요법 적응증", "FDA는 2024-11-20 승인했고, EMA는 2025-06-27 승인(조건부 허가로 명시)까지 완료해 양대 규제기관 문턱을 넘었다", "국내는 식약처(MFDS) 허가가 확인되지 않으며(브랜드명 공란), 심평원(HIRA) 급여도 ‘not_found’로 약가·급여기준 데이터가 없다", "글로벌 승인 후 460일 경과 시점으로, 통상 1~2년 내 허가 신청이 이뤄지는 패턴을 대입하면 ‘허가 신청 진행 중일 가능성’ 구간에 들어섰다(입력 추정치). 다만 CRIS 국내 임상 0건이라 국내 브리지 데이터 없이 도입되는 ‘글로벌 자료 기반 허가’ 전략 여부가 관건이다"], "global_heading": "HER2 담도암 ‘2차’의 빈자리를 노렸다", "global_section": "담도암은 1차 치료 이후 선택지가 급격히 줄어드는 암종인데, zanidatamab-hrii는 HER2 양성(IHC3+) 환자를 바이오마커로 선별해 ‘2차 이후 단독요법’ 포지션을 정조준했다. 약물은 HER2 수용체에 두 부위로 결합하도록 설계된 항체로, HER2 신호 차단과 면역효과(항체의존성 세포독성 등)를 동시에 노리는 기전적 차별성이 핵심이다. 적응증은 “절제 불가능 국소진행/전이성 HER2 양성(IHC3+) 담도암, 전신치료 1차 이상 후”로 명확히 라인과 바이오마커가 고정돼 있어, 급여 설계 시에도 IHC 기준과 치료라인이 그대로 청구 요건으로 전환될 가능성이 높다.\n\n| 기관 | 상태 | 승인일 |\n|---|---|---|\n| FDA | 승인 완료 (D+460일) | 2024-11-20 |\n| EMA | 승인 완료 (D+241일) | 2025-06-27 |\n| MFDS | 승인 여부가 확인되지 않는다 | - |\n\n경쟁 구도는 동일 암종 내 ‘HER2 표적 치료’가 국내에서 표준화돼 있지 않다는 점이 더 큰 문제다. 입력된 경쟁약(Polatuzumab vedotin, Zolbetuximab, Ivosidenib, Talquetamab)은 모두 종양영역이지만 담도암/HER2 축과 직접 겹치지 않는 약물로, zanidatamab의 비교대상은 오히려 “담도암 2차 치료의 기존 화학요법/표준요법(기관별 상이)”이 된다. FDA(2024-11-20)와 EMA(2025-06-27, 조건부) 연속 승인은 ‘희귀 암종의 바이오마커 치료제’가 글로벌에서 먼저 표준을 만드는 전형을 보여준다.", "domestic_heading": "허가도 급여도 ‘미탑재’, 460일째 대기", "domestic_section": "국내에서는 zanidatamab-hrii의 식약처 허가가 확인되지 않고, 심평원 급여 등재도 조회되지 않아(‘not_found’) 병원 처방·청구의 출발선 자체가 없다. 특히 CRIS 국내 임상 0건은, 현재로선 국내 연구 네트워크를 통해 환자 접근성을 확보할 경로가 사실상 없다는 뜻이다.\n\n| 구분 | 국내 상태(입력 데이터) | 실무적 의미 |\n|---|---|---|\n| MFDS 허가 | 승인 여부 미확인 | 원칙적으로 국내 유통·처방 경로 부재 |\n| HIRA 급여 | not_found(약가 없음) | 보험 청구 불가(급여코드 자체 미확정) |\n| CRIS 임상 | 0건 | 임상 참여를 통한 접근 옵션 제한 |\n\n타임라인은 ‘글로벌 승인 후 460일’로, 입력된 추정치가 명시하듯 “허가 신청 진행 중일 가능성(통상 1~2년)” 구간에 해당한다. 즉, 지금 병원 약제·심사 실무에서 중요한 질문은 ‘도입 시점’보다 ‘도입 형태’다: 희귀의약품 지정 이력이 있다면(입력 근거) 자료요건·심사트랙(GIFT 등 신속심사 활용 가능성)과 함께, 국내 HER2 검사(특히 IHC3+ 판정) 운영체계를 급여요건으로 어떻게 잠글지가 관건이 된다. 경쟁약 비교 관점에서는, 입력된 종양 경쟁약들(예: polatuzumab vedotin)도 국내 상태가 ‘expected’로 잡혀 있어, 항암 신약 전반이 “글로벌 승인→국내 미탑재” 구간에 -06-27 |\n\nFDA와 EMA가 7개월 간격으로 연속 승인한 것은 ‘HER2 양성 담도암’이라는 좁은 표적군에서 글로벌 규제기관이 치료 가치를 인정했다는 의미다. 특히 EMA는 입력 데이터에 ‘Conditional Approval’로 표기돼, 추적 데이터(유효성/안전성 보완) 제출이 시장 접근의 전제조건이 될 가능성이 크다.", "domestic_heading": "D+460일, 한국은 ‘조회 불가’", "domestic_section": "국내에서는 식약처(MFDS) 허가가 아직 확인되지 않고, 심평원(HIRA)도 급여 등재/약가 정보가 ‘not_found’로 조회되지 않아 처방·청구 경로가 열려 있지 않다. 또한 CRIS(임상연구정보서비스) 등록 임상이 0건으로, ‘국내 임상 기반의 조기 접근’ 루트도 현재 데이터상 확인되지 않는다. 다만 입력된 타임라인 코멘트가 “글로벌 승인 후 460일 — 허가 신청 진행 중일 가능성(통상 1~2년)”로 제시된 만큼, 병원 약제팀은 허가 직후 도입을 가정한 검사-처방-청구 체계를 선제 정렬할 필요가 있다.\n\n- MFDS: 승인 여부가 확인되지 않는다(제품명 공란)\n- HIRA: 급여/약가 ‘not_found’(등재 자체가 확인되지 않음)\n- CRIS: 국내 임상 0건(등록 기준)\n\n| 비교 항목(입력 경쟁 리스트) | INN | 국내 상태(데이터 표기) |\n|---|---|---|\n| 경쟁 후보 1 | Polatuzumab Vedotin | expected |\n| 경쟁 후보 2 | Zolbetuximab | uncertain |\n| 경쟁 후보 3 | Ivosidenib | uncertain |\n\n같은 항암 영역에서조차 국내 상태가 ‘expected/uncertain’로 남아 있는 약물들이 다수라는 점은, 국내 도입이 “글로벌 승인”만으로 자동 전환되지 않는다는 현실을 보여준다. 담도암은 바이오마커 기반(IHC3+) 처방이므로, 약제위원회 차원에서는 HER2 IHC 판독 표준화와 의무기록 내 치료 라인(‘이전 전신치료 1차 이상’) 확인 로직을 먼저 준비하는 것이 도입 속도를 좌우한다.", "medclaim_section": "현 시점에서 zanidatamab-hrii는 국내 허가·급여가 확인되지 않으므로, 건강보험 청구는 불가능한 상태로 정리하는 것이 안전하다. 즉, 처방을 전제로 한 급여 청구 설계(EDI 코드, 급여 기준 매핑, 사전심사(PA) 여부 판단)는 ‘약가·등재’가 확인되기 전까지는 진행할 수 없다. 다만 항암제 영역에서는 허가 전 접근 경로(긴급도입, 제약사 프로그램 등)가 변수로 작동할 수 있어, 환자 상담 시 비용 부담 구조를 명확히 구분해야 한다.\n\n| 시나리오 | 환자 본인부담률/부담 | 청구 가능 여부 | 비고 |\n|---|---|---|---|\n| 현재(미허가/미등재) | 100%(전액) | 불가 | HIRA 등재 ‘not_found’ |\n| 향후 급여 등재(암환자 산정특례) | 5% | 가능 | 입력 산정특례: 암환자 산정특례 5% (약가 미확인으로 금액 산정 불가) |\n| 향후 급여 등재(일반 급여) | 30% | 가능 | 외래 기준(약가 미확인) |\n\n- 허가 전 환자 접근이 필요할 때: KODC 긴급도입 등 ‘전액 본인부담’ 경로를 우선 안내하고, 병원 IRB/약사위원회 내부 절차(도입 적정성, 투여·모니터링 프로토콜)를 함께 준비해야 한다.\n- 약제팀/심사 실무 포인트: 담도암 ‘HER2 IHC3+’와 ‘이전 전신치료 1차 이상’ 요건이 청구 적정성의 핵심 문구가 될 가능성이 높아, 병리 결과지 템플릿과 항암 레지멘 라인관리(1L/2L)가 먼저 정비돼야 이후 삭감 리스크를 줄일 수 있다."}}}, {"inn": "trametinib", "a": {"inn": "trametinib", "headline": "항암제 트라메티닙, EMA 승인 — 국내 도입 임박", "subtitle": "MEK 억제제, 비소세포 폐암 치료 옵션으로 주목", "key_points": ["MEK 억제제로 비소세포 폐암 및 const NAME_A = "pre-v4";
const NAME_B = "2026-02-25_v4";

// ── 품질 지표 체크 ──
const BANNED_PHRASES = [
  "혁명적", "획기적", "사실상 제도권 밖", "게임체인저", "판도를 바꿀",
  "꿈의 신약", "기적", "만병통치", "완치", "100%"
];
const REPETITIVE_PHRASES = [
  "판매권자 부재", "시장성 판단 보류", "보험 적용 가능성 열려",
  "급여 가능성이 열려", "전액 환자 부담", "제도권 처방 경로"
];

function checkQuality(article) {
  if (!article) return null;
  const allText = [
    article.headline || "",
    article.subtitle || "",
    ...(article.key_points || []),
    article.global_section || "",
    article.domestic_section || "",
    article.medclaim_section || "",
  ].join(" ");

  // 반복 문구
  let repetitionCount = 0;
  for (const phrase of REPETITIVE_PHRASES) {
    const re = new RegExp(phrase, "g");
    const matches = allText.match(re);
    if (matches) repetitionCount += matches.length;
  }

  // 금지 표현
  let bannedCount = 0;
  const bannedFound = [];
  for (const phrase of BANNED_PHRASES) {
    if (allText.includes(phrase)) {
      bannedCount++;
      bannedFound.push(phrase);
    }
  }

  // 숫자 훅 (headline 또는 global 첫 문장에 숫자)
  const hookTarget = (article.headline || "") + " " +
    (article.global_section || "").split(/[.!?\n]/)[0];
  const hasNumberHook = /\d/.test(hookTarget);

  // MOA 연쇄 (→ 패턴)
  const hasMoaChain = allText.includes("→") &&
    (allText.match(/→/g) || []).length >= 2;

  // 한계점 서술
  const limitKeywords = ["다만", "한계", "CI", "p-value", "p=", "유의성", "95%"];
  const hasLimitation = limitKeywords.some(kw => allText.includes(kw));

  // 섹션별 글자수
  const lengths = {
    headline: (article.headline || "").length,
    global: (article.global_section || "").length,
    domestic: (article.domestic_section || "").length,
    medclaim: (article.medclaim_section || "").length,
    total: allText.length,
  };

  return {
    repetitionCount,
    bannedCount,
    bannedFound,
    hasNumberHook,
    hasMoaChain,
    hasLimitation,
    lengths,
  };
}

function mdTableToHtml(md) {
  if (!md) return "";
  const lines = md.trim().split("\n").filter(l => l.trim());
  if (lines.length < 2) return md;
  const parseRow = line => line.split("|").map(c => c.trim()).filter(c => c);

  const headers = parseRow(lines[0]);
  // skip separator (line 1)
  const rows = lines.slice(2).map(parseRow);

  let html = '<table class="fact-table"><thead><tr>';
  for (const h of headers) html += `<th>${h}</th>`;
  html += "</tr></thead><tbody>";
  for (const row of rows) {
    html += "<tr>";
    for (const cell of row) html += `<td>${cell}</td>`;
    html += "</tr>";
  }
  html += "</tbody></table>";
  return html;
}

function esc(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderMetric(label, pass, detail) {
  const icon = pass ? "✅" : "❌";
  const cls = pass ? "metric-pass" : "metric-fail";
  return `<div class="flex items-center gap-1.5 text-sm">
    <span>${icon}</span>
    <span class="${cls}">${label}</span>
    ${detail ? `<span class="text-gray-400 text-xs">${detail}</span>` : ""}
  </div>`;
}

function renderQualityCard(q, version) {
  if (!q) return `<div class="absent-badge">데이터 없음</div>`;
  return `
    <div class="bg-white rounded-lg border p-3 space-y-1">
      <div class="text-xs font-semibold text-gray-500 mb-2">★ Quality Metrics (${version})</div>
      ${renderMetric("반복 문구", q.repetitionCount === 0, q.repetitionCount + "회")}
      ${renderMetric("금지 표현", q.bannedCount === 0,
        q.bannedCount > 0 ? q.bannedFound.join(", ") : "0건")}
      ${renderMetric("숫자 훅", q.hasNumberHook, "")}
      ${renderMetric("MOA 연쇄", q.hasMoaChain, "")}
      ${renderMetric("한계점 서술", q.hasLimitation, "")}
      <div class="pt-1 border-t mt-1 text-xs text-gray-400">
        글자수: 전체 ${q.lengths.total.toLocaleString()} ·
        글로벌 ${q.lengths.global.toLocaleString()} ·
        국내 ${q.lengths.domestic.toLocaleString()} ·
        청구 ${q.lengths.medclaim.toLocaleString()}
      </div>
    </div>`;
}

function renderSection(label, emoji, textA, textB) {
  const a = textA ? esc(textA) : '<span class="absent-badge">없음</span>';
  const b = textB ? esc(textB) : '<span class="absent-badge">없음</span>';
  return `
    <div class="grid grid-cols-2 gap-4">
      <div class="panel">
        <div class="section-label">${emoji} ${label} (A)</div>
        <div class="section-content text-sm">${a}</div>
      </div>
      <div class="panel">
        <div class="section-label">${emoji} ${label} (B)</div>
        <div class="section-content text-sm">${b}</div>
      </div>
    </div>`;
}

function renderKeyPoints(kpA, kpB) {
  const renderList = (kps) => {
    if (!kps || kps.length === 0) return '<span class="absent-badge">없음</span>';
    return kps.map(p => `<div class="key-point">${esc(p)}</div>`).join("");
  };
  return `
    <div class="grid grid-cols-2 gap-4">
      <div class="panel">
        <div class="section-label">🔑 Key Points (A: ${kpA ? kpA.length : 0})</div>
        ${renderList(kpA)}
      </div>
      <div class="panel">
        <div class="section-label">🔑 Key Points (B: ${kpB ? kpB.length : 0})</div>
        ${renderList(kpB)}
      </div>
    </div>`;
}

function renderV4Facts(factsA, factsB) {
  if (!factsA && !factsB) return "";
  const render = (f, label) => {
    if (!f) return `<div class="absent-badge">V4 팩트 없음</div>`;

        <div>
          <div class="text-xs font-medium text-gray-500 mb-1">승인 현황</div>

          ${mdTableToHtml(f.cost_scenario_table || "")}
        </div>
      </div>`;
  };
  return `
    <div class="grid grid-cols-2 gap-4">
      <div class="panel">
        <div class="section-label">📊 V4 Facts (A)</div>
        ${render(factsA, "A")}
      </div>
      <div class="panel">
        <div class="section-label">📊 V4 Facts (B)</div>
        ${render(factsB, "B")}
      </div>
    </div>`;
}

      ${renderSection("Domestic Insight", "🇰🇷", a?.domestic_section, b?.domestic_section)}

      <!-- MedClaim Section -->
      ${renderSection("MedClaim Action", "💊", a?.medclaim_section, b?.medclaim_section)}
    </div>`;
}

// ── 초기화 ──
function init() {
  const select = document.getElementById("drugSelect");
  const main = document.getElementById("mainContent");
  const countEl = document.getElementById("drugCount");

  // 드롭다운 채우기
  DATA.forEach((entry, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    const inA = entry.a ? "A" : "-";
    const inB = entry.b ? "B" : "-";
    opt.textContent = `${entry.inn}  [${inA}/${inB}]`;
    select.appendChild(opt);
  });

  countEl.textContent = `${DATA.length}개 약물`;

  function render() {
    const idx = parseInt(select.value);
    main.innerHTML = renderDrug(DATA[idx]);
  }

  select.addEventListener("change", render);
  if (DATA.length > 0) render();
}

document.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
